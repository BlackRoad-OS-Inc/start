name: "{CERT_NAME}"
level: {1-5}
org: "{ORG_NAME}"
repo: "{REPO_NAME}"

prerequisites:
  - "Observer certification (level 1)"

objectives:
  - "Understand the {REPO_NAME} architecture"
  - "Navigate the codebase independently"
  - "Make changes following coding standards"

exercises:
  - description: "Clone and run locally"
    verification: "setup.sh exits cleanly"
  - description: "Find and fix one issue"
    verification: "PR submitted and approved"
  - description: "Deploy a change"
    verification: "Production URL returns updated response"

assessment:
  type: "practical"
  passing_score: 80
  time_limit_minutes: 60
