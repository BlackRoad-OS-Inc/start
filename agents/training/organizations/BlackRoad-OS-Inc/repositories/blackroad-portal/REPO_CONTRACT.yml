repo:
  name: blackroad-portal
  org: BlackRoad-OS-Inc
  type: worker
  languages: [javascript]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-portal

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Service URLs must come from config/KV, not hardcoded"
    - "Portal must link to all active services"

certification:
  required_level: 2
  modules: ["fundamentals", "workers"]

deployment:
  target: cloudflare-workers
  command: "npx wrangler deploy"
  health_check: "curl https://portal.blackroad.io"
