repo:
  name: source
  org: BlackRoad-OS-Inc
  type: reference
  languages: [python, bash, typescript, javascript]
  url: https://github.com/BlackRoad-OS-Inc/source

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Directory structure must follow the established taxonomy"
    - "New components must be added to the correct directory"
    - "Brand design rules in brand/ are canonical — never contradict them"
    - "Orchestrator changes require integration testing"

certification:
  required_level: 2
  modules: ["fundamentals", "agents"]

deployment:
  target: reference (not directly deployed)
  command: "upstream-sync.sh pulls from individual repos"
  health_check: "find . -type d | wc -l (should be ~198)"
