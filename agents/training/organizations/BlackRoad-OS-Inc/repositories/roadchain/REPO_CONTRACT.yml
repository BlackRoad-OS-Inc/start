repo:
  name: roadchain
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/roadchain

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Cryptographic changes require security review"
    - "Consensus changes must maintain backward compatibility"

certification:
  required_level: 3
  modules: ["fundamentals", "coding-standards", "mathematics"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
