repo:
  name: blackroad-dashboards
  org: BlackRoad-OS-Inc
  type: cli
  languages: [bash]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-dashboards

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Dashboards must be read-only (no side effects)"
    - "All scripts must pass shellcheck"

certification:
  required_level: 1
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "bash setup.sh"
  health_check: "bash blackroad-dashboard.sh"
