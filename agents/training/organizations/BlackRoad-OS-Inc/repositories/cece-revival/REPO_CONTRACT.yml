repo:
  name: cece-revival
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/cece-revival

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "CECE's personality must align with cece-profile.json in blackroad-agents"
    - "Memory data must never be deleted without explicit approval"
    - "Conversation logs must be treated as private data"

certification:
  required_level: 3
  modules: ["fundamentals", "agents"]

deployment:
  target: pi-fleet
  command: "bash deploy.sh"
  health_check: "curl localhost:5000/health"
