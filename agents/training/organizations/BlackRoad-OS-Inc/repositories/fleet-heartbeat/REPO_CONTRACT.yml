repo:
  name: fleet-heartbeat
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/fleet-heartbeat

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "SSH keys must never be in the repo"
    - "Auto-healing must log all actions"

certification:
  required_level: 2
  modules: ["fundamentals", "infrastructure"]

deployment:
  target: pi-fleet
  command: "bash deploy.sh"
  health_check: "curl localhost:8000/health"
