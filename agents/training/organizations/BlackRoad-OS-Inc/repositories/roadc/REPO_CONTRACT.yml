repo:
  name: roadc
  org: BlackRoad-OS-Inc
  type: language
  languages: [python, c]
  url: https://github.com/BlackRoad-OS-Inc/roadc

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Language changes must be documented in a changelog"
    - "All features must have test coverage"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards", "mathematics"]

deployment:
  target: local
  command: "python roadc.py"
  health_check: "python -m pytest"
