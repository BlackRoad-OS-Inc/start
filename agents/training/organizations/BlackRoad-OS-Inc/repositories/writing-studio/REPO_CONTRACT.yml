repo:
  name: writing-studio
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/writing-studio

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "AI writing must disclose it is AI-generated"
    - "Analysis must support multiple languages"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
