repo:
  name: backroad-social
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/backroad-social

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Bots must not spam — rate limit all cross-posting"
    - "User data must be treated as private"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
