repo:
  name: lucidia-core
  org: BlackRoad-OS-Inc
  type: library
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/lucidia-core

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Agent reasoning must be traceable (explain chain of thought)"
    - "Vector store must handle concurrent access"

certification:
  required_level: 3
  modules: ["fundamentals", "agents", "mathematics"]

deployment:
  target: local (library)
  command: "pip install -e ."
  health_check: "python -c 'from lucidia_core import *'"
