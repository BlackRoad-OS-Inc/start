# BlackRoad OS Repository Contract
# Machine-readable governance for blackroad-operator

repo:
  name: blackroad-operator
  org: BlackRoad-OS-Inc
  type: cli
  languages: [bash, typescript, python]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-operator

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Shell scripts must pass shellcheck"
    - "New tools must be registered in br dispatcher"
    - "Memory scripts must maintain backward compatibility"

certification:
  required_level: 2  # Contributor
  modules: ["fundamentals", "infrastructure", "coding-standards"]
  exam: EXAM.md
  exercises: EXERCISES.md

deployment:
  target: local + pi-fleet
  command: "rsync + ssh"
  health_check: "br fh"

safe_changes:
  ref: SAFE_CHANGE_BOUNDARIES.md
