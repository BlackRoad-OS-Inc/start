repo:
  name: blackroad-auth
  org: BlackRoad-OS-Inc
  type: worker
  languages: [javascript]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-auth

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "JWT secret must ONLY exist in Worker secrets"
    - "Never store raw passwords — PBKDF2 hash only"
    - "Never log passwords or tokens"
    - "Rate limiting must be active on all auth endpoints"
    - "Security changes require thorough review"

certification:
  required_level: 4
  modules: ["fundamentals", "workers", "coding-standards"]

deployment:
  target: cloudflare-workers
  command: "npx wrangler deploy"
  health_check: "curl https://auth.blackroad.io/api/health"

safe_changes:
  ref: SAFE_CHANGE_BOUNDARIES.md
