repo:
  name: context-bridge
  org: BlackRoad-OS-Inc
  type: app
  languages: [javascript]
  url: https://github.com/BlackRoad-OS-Inc/context-bridge

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "User context must be encrypted at rest"
    - "Chrome extension must request minimal permissions"

certification:
  required_level: 3
  modules: ["fundamentals", "workers", "agents"]

deployment:
  target: cloudflare-workers + chrome
  command: "node server.js"
  health_check: "bash QUICK_TEST_NOW.sh"
