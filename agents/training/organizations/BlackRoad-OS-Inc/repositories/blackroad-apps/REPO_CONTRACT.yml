repo:
  name: blackroad-apps
  org: BlackRoad-OS-Inc
  type: collection
  languages: [javascript, rust]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-apps

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Every app must have a service worker for offline support"
    - "Apps must follow BlackRoad design system"

certification:
  required_level: 2
  modules: ["fundamentals", "workers"]

deployment:
  target: cloudflare-pages
  command: "npm run build (per app)"
  health_check: "curl each app URL"
