repo:
  name: blackroad-cli
  org: BlackRoad-OS-Inc
  type: cli
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-cli

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "New bots must be registered in __init__.py"
    - "Bots must handle errors gracefully (no raw tracebacks to users)"
    - "Bots must not store credentials locally"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local (pip install or direct execution)
  command: "pip install -e . or python -m bots"
  health_check: "python -c 'import bots'"
