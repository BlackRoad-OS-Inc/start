repo:
  name: roadwork-platform
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/roadwork-platform

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Student data must be treated as private (FERPA-adjacent)"
    - "AI tutoring must cite sources"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
