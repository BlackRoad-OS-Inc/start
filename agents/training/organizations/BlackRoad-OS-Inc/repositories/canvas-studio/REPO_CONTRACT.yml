repo:
  name: canvas-studio
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/canvas-studio

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "All generated designs must be exportable"
    - "Brand colors must match DESIGN-RULES.md"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
