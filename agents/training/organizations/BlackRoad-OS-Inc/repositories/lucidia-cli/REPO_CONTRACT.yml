repo:
  name: lucidia-cli
  org: BlackRoad-OS-Inc
  type: cli
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/lucidia-cli

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Virtual filesystem must be isolated from real filesystem"
    - "All TUI components must handle terminal resize"

certification:
  required_level: 3
  modules: ["fundamentals", "agents", "coding-standards"]

deployment:
  target: local
  command: "bash setup.sh"
  health_check: "python -m pytest"
