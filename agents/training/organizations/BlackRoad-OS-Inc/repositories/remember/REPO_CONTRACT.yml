repo:
  name: remember
  org: BlackRoad-OS-Inc
  type: library
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/remember

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Memory data must be treated as private"
    - "Contradiction logs must never be silently discarded"

certification:
  required_level: 3
  modules: ["fundamentals", "agents"]

deployment:
  target: local (library)
  command: "pip install -e ."
  health_check: "python -c 'import remember'"
