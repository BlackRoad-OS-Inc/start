repo:
  name: hailo-vision
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/hailo-vision

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Hailo models must be version-controlled separately (large files)"
    - "Inference must respect thermal limits"

certification:
  required_level: 3
  modules: ["fundamentals", "infrastructure"]

deployment:
  target: pi-fleet (Cecilia/Octavia)
  command: "bash deploy.sh"
  health_check: "curl localhost:8000/health"
