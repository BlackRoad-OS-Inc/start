repo:
  name: lucidia
  org: BlackRoad-OS-Inc
  type: orchestrator
  languages: [python, bash]
  url: https://github.com/BlackRoad-OS-Inc/lucidia

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Deployment scripts must be tested on staging first"
    - "Quantum loop must be idempotent"

certification:
  required_level: 4
  modules: ["fundamentals", "agents", "infrastructure"]

deployment:
  target: pi-fleet
  command: "bash deployment_scripts/deploy.sh"
  health_check: "ssh pi@lucidia 'pgrep python'"
