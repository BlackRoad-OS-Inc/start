repo:
  name: video-studio
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/video-studio

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Effects must be deterministic (same input = same output)"
    - "Video export must support common formats"

certification:
  required_level: 2
  modules: ["fundamentals", "coding-standards"]

deployment:
  target: local
  command: "pip install -e ."
  health_check: "python -m pytest"
