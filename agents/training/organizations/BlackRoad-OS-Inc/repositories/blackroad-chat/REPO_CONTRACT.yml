repo:
  name: blackroad-chat
  org: BlackRoad-OS-Inc
  type: worker
  languages: [javascript, typescript]
  url: https://github.com/BlackRoad-OS-Inc/blackroad-chat

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Never log chat content (user privacy)"
    - "Streaming must be tested before deploy"

certification:
  required_level: 2
  modules: ["fundamentals", "workers"]

deployment:
  target: cloudflare-workers
  command: "npx wrangler deploy"
  health_check: "curl https://chat.blackroad.io"
