repo:
  name: ai-chain
  org: BlackRoad-OS-Inc
  type: app
  languages: [python]
  url: https://github.com/BlackRoad-OS-Inc/ai-chain

ownership:
  owner: blackboxprogramming
  codeowners: ["@blackboxprogramming"]
  license: proprietary

policies:
  inherits: ["coding", "collaboration", "safety", "issues", "pr-review", "docs"]
  additional:
    - "Node addresses must come from config, not hardcoded"
    - "Failover must be tested before deployment"

certification:
  required_level: 3
  modules: ["fundamentals", "infrastructure", "agents"]

deployment:
  target: pi-fleet
  command: "bash deploy.sh"
  health_check: "curl localhost:8000/health"
